<!DOCTYPE html>
<html lang="ja">
<head>
	<meta charset="UTF-8">
	<title>患者管理</title>
	<style>
		body {
			font-family: Arial;
			margin: 20px;
		}
		
		h1 {
			color: #333;
		}
		
		table {
			border-collapse: collapse;
			width: 100%;
			margin-top: 20px;
		}
		
		th, td {
			border: 1px solid #ccc;
			padding: 8px;
			text-align: center;
		}
		
		th {
			background-color: #f5f5f5;
		}
		
		button {
			border-radius: 8px;
			padding: 5px 10px;
			background-color: #ff6666;
			color: white;
			border: none;
			cursor: pointer;
		}
		
		button:hover {
			opacity: 0.8;
		}
		
		input {
			margin: 5px;
			padding: 5px;
		}
	</style>
</head>
<body>
	<h1>患者管理アプリ</h1>
	
	<h2>患者登録</h2>
	<label for="name">名前：</label>
	<input type="text" id="name"><br>
	<label for="age">年齢：</label>
	<input type="number" id="age"><br>
	<label for="disease">病名：</label>
	<input type="text" id="disease"><br>
	<button onclick="addPatient()">登録</button>
	
	<h2>患者一覧</h2>
	<table border="1">
		<thead>
			<tr>
				<th>名前</th>
				<th>年齢</th>
				<th>病名</th>
				<th>操作</th>
			</tr>
		</thead>
		<tbody id="list"></tbody>
	</table>
	
<script>
	async function addPatient() {
		const name = document.getElementById("name").value;
		const age = document.getElementById("age").value;
		const disease = document.getElementById("disease").value;
		
		await fetch("http://localhost:8080/patients", {
			method: "POST",
			headers: {
				"Content-Type": "application/json"
			},
			body:JSON.stringify({name, age, disease})
		});
		document.getElementById("name").value = "";
		document.getElementById("age").value = "";
		document.getElementById("disease").value = "";
		loadPatients();
	}
	
	async function loadPatients(){
		const res = await fetch("http://localhost:8080/patients");
		const data = await res.json();
		const list = document.getElementById("list");
		list.innerHTML = "";
		
		data.forEach(p => {
			const tr = document.createElement("tr");
			tr.innerHTML = `
				<td>${p.name}</td>
				<td>${p.age}</td>
				<td>${p.disease}</td>
				<td></td>
			`;
			
			const btn = document.createElement("button");
			btn.textContent = "削除";
			
			btn.onclick = async() => {
				if(!confirm ("削除しますか？"))return;
				await fetch (`http://localhost:8080/patients/${p.id}` , {
					method: "DELETE"
				});
				loadPatients();
			};
			
			tr.children[3].appendChild(btn);
			list.appendChild(tr);
		});
	}
	
	loadPatients();
</script>
</body>
